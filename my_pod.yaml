apiVersion: v1
kind: Pod
metadata:
  name: nodejs-web
  # namespace: app
  labels:
    app: nodejs-web
    tier: front-end
  # annotations:
  #   description: our coolest application
  #   example: 1234-5678 other value, bla bla bla bla bla bla
spec:
  containers:
    - name: nodejs-web
      image: nodejs-web:1
      imagePullPolicy: Never
      port:
      ports:
        - containerPort: 3000
      resources:
        requests: #The minimum amount of CPU or memory a container is guaranteed.
          # mebibyte
          memory: "104Mi"
          # milli core          
          cpu: "250m"
        limits: # The maximum amount of CPU or memory a container is allowed to consume.
          memory: "128Mi"
          cpu: "500m"
      env:
        - name: MY_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: MY_POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
      envFrom:
        - configMapRef:
            name: my-configmap
        - secretRef:
            name: secret-name

