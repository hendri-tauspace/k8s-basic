apiVersion: v1
kind: Pod
metadata:
  name: nodejs-web
  # namespace: training
  labels:
    app: nodejs-web
  # annotations:
  #   description: our coolest application
  #   example: 1234-5678 other value, bla bla bla bla bla bla
spec:
  containers:
    - name: nodejs-web
      image: nodejs-web:1
      imagePullPolicy: Never
      resources:
        requests:
          # mebibyte
          memory: "104Mi"
          # milli core          
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"
      envFrom:
        - configMapRef:
            name: my-configmap
        - secretRef:
            name: secret-name
      # env:
      #   - name: MY_POD_NAME
      #     valueFrom:
      #       fieldRef:
      #         fieldPath: metadata.name
      #   - name: MY_POD_NAMESPACE
      #     valueFrom:
      #       fieldRef:
      #         fieldPath: metadata.namespace

