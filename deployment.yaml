apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    version: v1
  annotations:
    description: This is version 1
spec:
  # revisionHistoryLimit: 3
  replicas: 3
  selector:
    matchLabels:
      app: nodejs-web
  template:
    metadata:
      name: nodejs-web
      labels:
        app: nodejs-web
    spec:
      containers:
      - name: nodejs-web
        image: nodejs-web:1
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi